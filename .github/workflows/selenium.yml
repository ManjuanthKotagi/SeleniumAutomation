name: Selenium Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run TestNG Suite
        run: mvn clean test -DsuiteXmlFile=testng.xml

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-output/