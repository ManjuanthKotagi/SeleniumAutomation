name: Scheduled Selenium Tests

on:
  schedule:
    - cron: '30 2 * * 1'   # Monday 8:00 AM IST
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Run TestNG Suite
        run: mvn clean test -DsuiteXmlFile=testng.xml

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: |
            test-output/
            extent-report/

      # Send Email with Extent Report
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Selenium Test Report - Weekly Run
          to: manju.virgosys@gmail.com
          from: GitHub Actions
          body: |
            Hello,

            Please find attached the latest Selenium execution report.

            Regards,
            GitHub Actions
          attachments: |
            test-output/**/*.html
            extent-report/**/*.html